# A generic, minimal Alembic configuration file.
# Refer to the Alembic documentation for detailed configuration options.

[alembic]
# path to migration scripts
script_location = alembic

# sqlalchemy.url defines the database connection.
# Ensure this is set to your actual database URL.
# Example for PostgreSQL:
# sqlalchemy.url = postgresql://user:password@host:port/dbname
# Example for SQLite (relative path):
# sqlalchemy.url = sqlite:///./observability_dashboard.db
# This should typically be configured via an environment variable or a config file.
# For now, it's commented out. You'll need to set this for Alembic to work.
# sqlalchemy.url = %(DB_CONNECTION_STRING)s

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
